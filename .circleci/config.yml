version: 2.1

orbs:
  node: circleci/node@5.2.0

executors:
  node-executor:
    docker:
      - image: cimg/node:20.18.1
    working_directory: ~/project

jobs:
  ci:
    executor: node-executor
    steps:
      - checkout
      - node/with-cache:
          steps:
            - run:
                name: Install dependencies
                command: cd ai-kit && npm ci
            - run:
                name: Run CI checks
                command: cd ai-kit && npm run ci
      - store_test_results:
          path: ~/project/ai-kit/test-results

  release:
    executor: node-executor
    steps:
      - checkout
      - node/with-cache:
          steps:
            - run:
                name: Install dependencies
                command: cd ai-kit && npm ci
      - run:
          name: Configure git
          command: |
            git config user.email "circleci@clubmatto.com"
            git config user.name "CircleCI"
      - run:
          name: Release
          command: cd ai-kit && npm run release

workflows:
  ci-workflow:
    jobs:
      - ci:
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/

  release-workflow:
    jobs:
      - release:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /v[0-9]+(\.[0-9]+)*/
