version: 2.1

orbs:
  node: circleci/node@5.2.0

executors:
  node-executor:
    docker:
      - image: cimg/node:20.18.1
    working_directory: ~/project

jobs:
  ci:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: cd ai-kit && npm install
      - run:
          name: Run CI checks
          command: cd ai-kit && npm run ci
      - store_test_results:
          path: ~/project/ai-kit/test-results

  release:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: cd ai-kit && npm install
      - run:
          name: Publish to npm with OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            cd ai-kit && npm publish --access public

workflows:
  ci-workflow:
    jobs:
      - ci:
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/

  release-workflow:
    jobs:
      - release:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /ai-kit\/v[0-9]+(\.[0-9]+)*/
