name: CI

on:
  push:
    branches: [main]
    paths:
      - ai-kit/**
  pull_request:
    paths:
      - ai-kit/**

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ai-kit/package-lock.json
      - run: npm ci
        working-directory: ai-kit
      - run: npm run ci
        working-directory: ai-kit
