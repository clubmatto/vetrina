name: ai-kit Release

on:
  push:
    tags:
      - "ai-kit/v[0-9]+.[0-9]+.[0-9]+"
    paths:
      - "ai-kit/**"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-kit
    environment:
      name: production
      url: https://www.npmjs.com/package/@clubmatto/ai-kit
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ai-kit/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npm publish --access public
