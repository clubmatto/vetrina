name: ai-kit Release

on:
  push:
    tags:
      - "ai-kit/v[0-9]+.[0-9]+.[0-9]+"
    paths:
      - "ai-kit/**"
      - ".github/workflows/ai-kit-release.yml"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-kit
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ai-kit/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npm install -g npm@latest

      - run: npm publish --access public --provenance
