name: ai-kit CI

on:
  push:
    branches: ["**"]
    paths:
      - "ai-kit/**"
      - ".github/workflows/ai-kit-*.yml"
  pull_request:
    branches: [main]
    paths:
      - "ai-kit/**"
      - ".github/workflows/ai-kit-*.yml"

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-kit
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ai-kit/package-lock.json

      - run: npm ci

      - run: npm run ci
